name: email-triage-env
version: 1.0

tasks:
  - name: easy_task
    description: classify simple email
    grader:
      type: python
      path: grader.py
      function: grade_easy

  - name: medium_task
    description: classify and reply email
    grader:
      type: python
      path: grader.py
      function: grade_medium

  - name: hard_task
    description: complex email understanding
    grader:
      type: python
      path: grader.py
      function: grade_hard
